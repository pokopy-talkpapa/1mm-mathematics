<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ひっ算ルーレット</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --dark: #111;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
    touch-action: manipulation;
  }

  .wrap {
    max-width: 400px;
    margin: 0 auto;
    padding: 12px;
  }

  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 14px 20px;
  }

  .title {
    font-weight: 950;
    font-size: 20px;
    margin: 0 0 16px;
    text-align: center;
  }

  /* カード表示エリア */
  .stage {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    max-width: 300px;
    min-height: 220px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 10px;
    border: 3px solid rgba(0,0,0,.05);
    pointer-events: none;
    z-index: 5;
  }

  /* ルーレット中：数字を高速表示 */
  .numDisplay {
    font-size: 72px;
    font-weight: 950;
    color: #ddd;
    user-select: none;
    transition: color .05s;
    display: none;
  }

  /* 結果：筆算画像 */
  .hissanImg {
    max-width: 200px;
    max-height: 180px;
    object-fit: contain;
    display: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.08));
  }

  /* 待機中メッセージ */
  .waitMsg {
    font-size: 16px;
    font-weight: 900;
    color: #bbb;
    text-align: center;
    padding: 16px;
    line-height: 1.6;
  }

  /* 結果オーバーレイのアニメーション */
  @keyframes popIn {
    0%   { transform: scale(0.75); opacity: 0; }
    70%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1);    opacity: 1; }
  }

  .hissanImg.pop {
    animation: popIn .3s ease forwards;
  }

  /* カード光るアニメーション */
  @keyframes glow {
    0%,100% { box-shadow: 0 6px 14px rgba(0,0,0,.08); }
    50%      { box-shadow: 0 6px 30px rgba(80,140,255,.35); }
  }

  .card.spinning {
    animation: glow .4s ease infinite;
  }

  /* スタート/ストップボタン */
  .btnRow {
    display: flex;
    justify-content: center;
  }

  .mainBtn {
    border: 0;
    border-radius: 14px;
    font-weight: 950;
    cursor: pointer;
    padding: 16px 0;
    font-size: 20px;
    width: 100%;
    max-width: 300px;
    background: var(--dark);
    color: #fff;
    transition: transform .08s ease, opacity .08s ease;
  }

  .mainBtn:active { transform: scale(.98); }
  .mainBtn:disabled { opacity: .5; cursor: not-allowed; }

  .mainBtn.stop {
    background: #c0392b;
  }

  .mainBtn.stopping {
    background: #888;
    cursor: not-allowed;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <p class="title">ひっ算ルーレット</p>

    <div class="stage">
      <div class="card" id="card">
        <div id="numDisplay" class="numDisplay">1</div>
        <img id="hissanImg" class="hissanImg" src="" alt="ひっ算" />
        <div id="waitMsg" class="waitMsg">スタートを<br>おしてね！</div>
      </div>
    </div>

    <div class="btnRow">
      <button id="mainBtn" class="mainBtn" type="button">スタート</button>
    </div>
  </div>
</div>

<script>
  const IMG_BASE = "../imgs/";
  const TOTAL = 81;

  const card       = document.getElementById("card");
  const numDisplay = document.getElementById("numDisplay");
  const hissanImg  = document.getElementById("hissanImg");
  const waitMsg    = document.getElementById("waitMsg");
  const mainBtn    = document.getElementById("mainBtn");

  const FAST_INTERVAL    = 55;   // 最速（ms）
  const SLOW_INTERVAL    = 420;  // 最遅（ms）
  const SLOWDOWN_STEPS   = 18;   // 減速ステップ数

  // フェーズ: 'idle' | 'spinning' | 'stopping'
  let phase     = "idle";
  let animTimer = null;
  let chosen    = 1;
  let slowStep  = 0;   // 減速フェーズのカウンタ

  // --- 音 ---
  let audioCtx = null;
  function getAudio() {
    const Cls = window.AudioContext || window.webkitAudioContext;
    if (!Cls) return null;
    if (!audioCtx) audioCtx = new Cls();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function tick(vol = 0.04) {
    const ctx = getAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(1200, now);
    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(vol, now + 0.005);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
    osc.connect(amp); amp.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.05);
  }

  function fanfare() {
    const ctx = getAudio();
    if (!ctx) return;
    [[523,0],[659,0.1],[784,0.2],[1047,0.32]].forEach(([f, w]) => {
      const now = ctx.currentTime + w;
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(f, now);
      amp.gain.setValueAtTime(0.0001, now);
      amp.gain.exponentialRampToValueAtTime(0.04, now + 0.01);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc.connect(amp); amp.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.22);
    });
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  const colors = ["#e0e0e0","#c8d8ff","#ffd8c8","#d0f0c0","#ffe8b0","#f0d0ff"];

  function showNum(n) {
    waitMsg.style.display    = "none";
    hissanImg.style.display  = "none";
    numDisplay.style.display = "block";
    numDisplay.textContent   = n;
    numDisplay.style.color   = colors[Math.floor(Math.random() * colors.length)];
  }

  function showResult(n) {
    waitMsg.style.display    = "none";
    numDisplay.style.display = "none";
    hissanImg.src = IMG_BASE + n + ".png";
    hissanImg.style.display  = "block";
    hissanImg.classList.remove("pop");
    void hissanImg.offsetWidth;
    hissanImg.classList.add("pop");
  }

  // 高速スピン中のステップ
  function fastStep() {
    if (phase !== "spinning") return;
    showNum(randInt(1, TOTAL));
    tick(0.03);
    animTimer = setTimeout(fastStep, FAST_INTERVAL);
  }

  // ストップ後の減速ステップ
  function slowStep_fn() {
    if (phase !== "stopping") return;
    slowStep++;

    // イーズアウトでインターバルを伸ばす
    const t = slowStep / SLOWDOWN_STEPS;
    const eased = t * t;
    const interval = FAST_INTERVAL + (SLOW_INTERVAL - FAST_INTERVAL) * eased;

    if (slowStep >= SLOWDOWN_STEPS) {
      // 完全停止
      phase = "idle";
      card.classList.remove("spinning");
      showResult(chosen);
      fanfare();
      mainBtn.textContent = "スタート";
      mainBtn.classList.remove("stopping");
      mainBtn.disabled = false;
      return;
    }

    // 残り数ステップは chosen 周辺をちらつかせる
    let display;
    if (slowStep >= SLOWDOWN_STEPS - 4) {
      const offset = randInt(-2, 2);
      display = ((chosen - 1 + offset + TOTAL) % TOTAL) + 1;
    } else {
      display = randInt(1, TOTAL);
    }
    showNum(display);
    tick(0.02 + 0.02 * (1 - t)); // だんだん小さい音に

    animTimer = setTimeout(slowStep_fn, interval);
  }

  function startSpin() {
    clearTimeout(animTimer);
    phase = "spinning";
    card.classList.add("spinning");
    mainBtn.textContent = "ストップ";
    mainBtn.classList.remove("stopping");
    mainBtn.classList.add("stop");
    mainBtn.disabled = false;
    // Start音のために AudioContext を起こす
    getAudio();
    fastStep();
  }

  function triggerStop() {
    if (phase !== "spinning") return;
    phase    = "stopping";
    slowStep = 0;
    chosen   = randInt(1, TOTAL);
    mainBtn.classList.remove("stop");
    mainBtn.classList.add("stopping");
    mainBtn.disabled = true;
    clearTimeout(animTimer);
    slowStep_fn();
  }

  mainBtn.addEventListener("click", () => {
    if (phase === "idle")     startSpin();
    else if (phase === "spinning") triggerStop();
  });
</script>
</body>
</html>
