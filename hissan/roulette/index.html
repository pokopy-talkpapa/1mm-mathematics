<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ひっ算ルーレット</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --dark: #111;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
    touch-action: manipulation;
  }

  .wrap {
    max-width: 400px;
    margin: 0 auto;
    padding: 12px;
  }

  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 14px 20px;
  }

  .title {
    font-weight: 950;
    font-size: 20px;
    margin: 0 0 16px;
    text-align: center;
  }

  /* カード表示エリア */
  .stage {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    max-width: 300px;
    min-height: 220px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 10px;
    border: 3px solid rgba(0,0,0,.05);
    pointer-events: none;
    z-index: 5;
  }

  /* 筆算画像ラッパー（ヒント位置の基準点） */
  .hissanWrap {
    position: relative;
    display: none;
    width: 160px;
    height: 160px;
  }

  .hissanImg {
    display: block;
    width: 160px;
    height: 160px;
    object-fit: contain;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.08));
  }

  /* 待機中メッセージ */
  .waitMsg {
    font-size: 16px;
    font-weight: 900;
    color: #bbb;
    text-align: center;
    padding: 16px;
    line-height: 1.6;
  }

  /* アニメーション */
  @keyframes popIn {
    0%   { transform: scale(0.75); opacity: 0; }
    70%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1);    opacity: 1; }
  }

  .hissanImg.pop {
    animation: popIn .3s ease forwards;
  }

  @keyframes glow {
    0%,100% { box-shadow: 0 6px 14px rgba(0,0,0,.08); }
    50%      { box-shadow: 0 6px 30px rgba(80,140,255,.35); }
  }

  .card.spinning {
    animation: glow .4s ease infinite;
  }

  /*
   * ヒントカード（数字の右横に絶対配置）
   *
   * 768×768 の筆算画像を 160px 表示したとき：
   *   上の数字の中心 y ≈ 42px（画像高さの約 26%）
   *   下の数字の中心 y ≈ 102px（画像高さの約 64%）
   *   数字の右端    x ≈ 141px（画像幅の約 88%）
   *
   * → left: 144px（数字右端+3px）で隣に配置
   * → 高さ 52px はおよそ数字 1 文字分
   */
  .hintPip {
    position: absolute;
    left: 144px;
    width: 52px;
    height: 52px;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 3px 10px rgba(0,0,0,.18);
    overflow: hidden;
    opacity: 0;
    transform: scale(0.82);
    transition: opacity .18s ease, transform .18s ease;
    pointer-events: none;
    z-index: 10;
  }

  .hintPip.show {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .hintPip img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  /* 上の数字に対応（中心 y=42px → top: 42-26=16px） */
  #hintPip1 { top: 16px; }

  /* 下の数字に対応（中心 y=102px → top: 102-26=76px） */
  #hintPip2 { top: 76px; }

  /* スタート/ストップボタン */
  .btnRow {
    display: flex;
    justify-content: center;
  }

  .mainBtn {
    border: 0;
    border-radius: 14px;
    font-weight: 950;
    cursor: pointer;
    padding: 16px 0;
    font-size: 20px;
    width: 100%;
    max-width: 300px;
    background: var(--dark);
    color: #fff;
    transition: transform .08s ease, opacity .08s ease;
  }

  .mainBtn:active { transform: scale(.98); }
  .mainBtn:disabled { opacity: .5; cursor: not-allowed; }
  .mainBtn.stop { background: #c0392b; }
  .mainBtn.stopping { background: #888; cursor: not-allowed; }

  /* ヒントボタン */
  .hintRow {
    margin-top: 10px;
    display: flex;
    justify-content: center;
  }

  .hintBtn {
    border: 2px solid #ddd;
    border-radius: 12px;
    background: #fff;
    color: #666;
    font-weight: 800;
    font-family: inherit;
    padding: 10px 0;
    font-size: 15px;
    width: 100%;
    max-width: 300px;
    cursor: pointer;
    transition: background .1s, border-color .1s, color .1s, transform .08s;
  }

  .hintBtn.active {
    background: #f0f6ff;
    border-color: #5a9fef;
    color: #1a6ed4;
  }

  .hintBtn:active { transform: scale(.98); }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <p class="title">ひっ算ルーレット</p>

    <div class="stage">
      <div class="card" id="card">
        <!-- 筆算ラッパー：ヒントピップの位置基準 -->
        <div id="hissanWrap" class="hissanWrap">
          <img id="hissanImg" class="hissanImg" src="" alt="ひっ算" />
          <!-- 上の数字の横（数字と同じサイズ感） -->
          <div class="hintPip" id="hintPip1">
            <img id="hintImg1" src="" alt="ヒント（上の数）" />
          </div>
          <!-- 下の数字の横 -->
          <div class="hintPip" id="hintPip2">
            <img id="hintImg2" src="" alt="ヒント（下の数）" />
          </div>
        </div>
        <div id="waitMsg" class="waitMsg">スタートを<br>おしてね！</div>
      </div>
    </div>

    <div class="btnRow">
      <button id="mainBtn" class="mainBtn" type="button">スタート</button>
    </div>
    <div class="hintRow">
      <button id="hintBtn" class="hintBtn" type="button">ヒント</button>
    </div>
  </div>
</div>

<script>
  const IMG_BASE   = "../imgs/";
  const APPLE_BASE = "https://pokopy-talkpapa.github.io/tashizan-apple/";
  const TOTAL = 81;

  const card       = document.getElementById("card");
  const hissanWrap = document.getElementById("hissanWrap");
  const hissanImg  = document.getElementById("hissanImg");
  const waitMsg    = document.getElementById("waitMsg");
  const mainBtn    = document.getElementById("mainBtn");
  const hintBtn    = document.getElementById("hintBtn");
  const hintPip1   = document.getElementById("hintPip1");
  const hintPip2   = document.getElementById("hintPip2");
  const hintImg1   = document.getElementById("hintImg1");
  const hintImg2   = document.getElementById("hintImg2");

  const FAST_INTERVAL  = 55;
  const SLOW_INTERVAL  = 420;
  const SLOWDOWN_STEPS = 18;

  let phase       = "idle";
  let animTimer   = null;
  let chosen      = 1;
  let slowStep    = 0;
  let hintVisible = false;
  let currentFile = null;

  // --- プリロード ---
  const imgCache = [];
  function preload() {
    for (let i = 1; i <= TOTAL; i++) {
      const img = new Image();
      img.src = IMG_BASE + i + ".png";
      imgCache[i] = img;
    }
    for (let i = 1; i <= 9; i++) {
      const img = new Image();
      img.src = APPLE_BASE + String(i).padStart(2, '0') + ".png";
    }
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ファイル番号 f → 上の数・下の数
  // 並び順: 1+1, 1+2, …, 1+9, 2+1, …, 9+9
  function getAddends(f) {
    return [Math.ceil(f / 9), ((f - 1) % 9) + 1];
  }

  function appleUrl(n) {
    return APPLE_BASE + String(n).padStart(2, '0') + ".png";
  }

  // ヒントピップの表示更新
  function updateHintCards(f, show) {
    if (!show || f === null) {
      hintPip1.classList.remove("show");
      hintPip2.classList.remove("show");
      return;
    }
    const [a1, a2] = getAddends(f);
    hintImg1.src = appleUrl(a1);
    hintImg2.src = appleUrl(a2);
    hintPip1.classList.add("show");
    hintPip2.classList.add("show");
  }

  // --- 音 ---
  let audioCtx = null;
  function getAudio() {
    const Cls = window.AudioContext || window.webkitAudioContext;
    if (!Cls) return null;
    if (!audioCtx) audioCtx = new Cls();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function tick(vol = 0.03) {
    const ctx = getAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(1200, now);
    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(vol, now + 0.005);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
    osc.connect(amp); amp.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.05);
  }

  function fanfare() {
    const ctx = getAudio();
    if (!ctx) return;
    [[523,0],[659,0.1],[784,0.2],[1047,0.32]].forEach(([f, w]) => {
      const now = ctx.currentTime + w;
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(f, now);
      amp.gain.setValueAtTime(0.0001, now);
      amp.gain.exponentialRampToValueAtTime(0.04, now + 0.01);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc.connect(amp); amp.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.22);
    });
  }

  // --- 画像表示 ---
  function showImg(n, pop = false) {
    currentFile = n;
    waitMsg.style.display    = "none";
    hissanWrap.style.display = "block";
    hissanImg.src = IMG_BASE + n + ".png";
    if (pop) {
      hissanImg.classList.remove("pop");
      void hissanImg.offsetWidth;
      hissanImg.classList.add("pop");
      updateHintCards(n, hintVisible); // 停止時、ヒントONなら表示
    } else {
      updateHintCards(null, false);    // スピン中は非表示
    }
  }

  // 高速スピン
  function fastStep() {
    if (phase !== "spinning") return;
    showImg(randInt(1, TOTAL));
    tick(0.03);
    animTimer = setTimeout(fastStep, FAST_INTERVAL);
  }

  // 減速
  function slowStep_fn() {
    if (phase !== "stopping") return;
    slowStep++;

    const t        = slowStep / SLOWDOWN_STEPS;
    const eased    = t * t;
    const interval = FAST_INTERVAL + (SLOW_INTERVAL - FAST_INTERVAL) * eased;

    if (slowStep >= SLOWDOWN_STEPS) {
      phase = "idle";
      card.classList.remove("spinning");
      showImg(chosen, true);
      fanfare();
      mainBtn.textContent = "スタート";
      mainBtn.classList.remove("stopping");
      mainBtn.disabled = false;
      return;
    }

    let display;
    if (slowStep >= SLOWDOWN_STEPS - 4) {
      const offset = randInt(-2, 2);
      display = ((chosen - 1 + offset + TOTAL) % TOTAL) + 1;
    } else {
      display = randInt(1, TOTAL);
    }
    showImg(display);
    tick(0.02 + 0.02 * (1 - t));
    animTimer = setTimeout(slowStep_fn, interval);
  }

  function startSpin() {
    clearTimeout(animTimer);
    phase = "spinning";
    card.classList.add("spinning");
    mainBtn.textContent = "ストップ";
    mainBtn.classList.remove("stopping");
    mainBtn.classList.add("stop");
    mainBtn.disabled = false;
    getAudio();
    fastStep();
  }

  function triggerStop() {
    if (phase !== "spinning") return;
    phase    = "stopping";
    slowStep = 0;
    chosen   = randInt(1, TOTAL);
    mainBtn.classList.remove("stop");
    mainBtn.classList.add("stopping");
    mainBtn.disabled = true;
    clearTimeout(animTimer);
    slowStep_fn();
  }

  mainBtn.addEventListener("click", () => {
    if (phase === "idle")          startSpin();
    else if (phase === "spinning") triggerStop();
  });

  // ヒントボタン
  hintBtn.addEventListener("click", () => {
    hintVisible = !hintVisible;
    hintBtn.classList.toggle("active", hintVisible);
    if (phase === "idle" && currentFile !== null) {
      updateHintCards(currentFile, hintVisible);
    }
  });

  preload();
</script>
</body>
</html>
