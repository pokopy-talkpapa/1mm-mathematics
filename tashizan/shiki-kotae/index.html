<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>どんな しき？</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --card-w: min(92vw, 360px);
    --dark: #111;
    --success: #0f8a2b;
    --pad-h: 252px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
    touch-action: manipulation;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px;
  }

  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px 16px;
    position: relative;
  }

  .titleRow {
    position: relative;
    min-height: 44px;
    margin-bottom: 8px;
  }

  .title {
    font-weight: 950;
    font-size: 22px;
    margin: 0;
    text-align: center;
    line-height: 44px;
  }

  .soundBtn {
    position: absolute;
    right: 0;
    top: 0;
    border: 0;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-weight: 950;
    cursor: pointer;
    background: #f1f1f1;
    color: var(--dark);
    line-height: 1;
  }

  .soundBtn.off { background: #e9e9e9; color: #666; }
  .soundIcon { font-size: 18px; line-height: 1; }

  .topModes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 4px 0 14px;
  }

  .modeBtn {
    border: 0;
    border-radius: 12px;
    padding: 12px 18px;
    min-width: 120px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    background: #ececec;
    color: var(--dark);
    transition: background .12s ease, color .12s ease;
  }

  .modeBtn.active { background: var(--dark); color: #fff; }
  .modeBtn:disabled { opacity: .55; cursor: not-allowed; }

  .stage { display: flex; justify-content: center; }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    padding: 12px;
    position: relative;
    aspect-ratio: 3 / 4;
    width: var(--card-w);
    overflow: hidden;
    margin: 0 auto;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    border: 3px solid rgba(0,0,0,.06);
    pointer-events: none;
    z-index: 5;
  }

  .cardInner { position: absolute; inset: 0; z-index: 1; }

  .cardDisplay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
  }
  .cardDisplay.show { display: flex; }

  .appleCardsRow {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 6px;
  }

  .appleCardSlot {
    flex: 1 1 0;
    max-width: 46%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .appleCardImg {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    user-select: none;
    pointer-events: none;
    display: block;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.08));
  }

  .answerBadge {
    position: absolute;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%) translateY(8px) scale(.96);
    min-width: 74px;
    height: 74px;
    padding: 0 16px;
    border-radius: 999px;
    background: rgba(255,255,255,.95);
    border: 3px solid rgba(15,138,43,.18);
    color: var(--success);
    box-shadow: 0 8px 18px rgba(0,0,0,.10);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 950;
    opacity: 0;
    transition: opacity .14s ease, transform .14s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .answerBadge.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }

  .messageArea {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .messageArea.show { display: flex; }

  .messageInner {
    background: rgba(255,255,255,.9);
    border-radius: 20px;
    padding: 20px 22px;
    box-shadow: 0 10px 24px rgba(0,0,0,.12);
    min-width: min(280px, 82%);
  }

  .messageTitle {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 950;
    line-height: 1.25;
    margin: 0;
    white-space: pre-line;
  }

  .messageSub {
    margin: 10px 0 0;
    font-size: 16px;
    font-weight: 800;
    color: #555;
    line-height: 1.6;
    white-space: pre-line;
  }

  .resultResetBtn {
    margin-top: 14px;
    border: 0;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    background: #efefef;
    color: var(--dark);
  }
  .resultResetBtn.hidden { display: none; }

  .controls {
    display: flex;
    justify-content: center;
    margin-top: 16px;
  }
  .controls.hidden { display: none; }

  .mainBtn {
    border: 0;
    border-radius: 14px;
    font-weight: 950;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 18px;
    background: var(--dark);
    color: #fff;
    min-width: 170px;
  }
  .mainBtn:disabled { opacity: .55; cursor: not-allowed; }

  /* ─── フェーズラベル ─── */
  .phaseHint {
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    color: #888;
    margin: 10px 0 6px;
    min-height: 20px;
    transition: opacity .15s;
  }

  /* ─── パッドラッパー（固定高さ）─── */
  .padWrap {
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    height: var(--pad-h);
  }

  /* 式パッド (2×2) */
  .equationPad {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .equationPad.hidden { display: none; }

  /* 数字パッド (3×3) */
  .digitPad {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .digitPad.hidden { display: none; }

  /* 共通ボタンスタイル */
  .equationBtn, .digitBtn {
    border: 0;
    border-radius: 16px;
    background: #fff;
    color: var(--dark);
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    font-weight: 950;
    cursor: pointer;
    transition: transform .08s ease, opacity .08s ease;
    width: 100%;
    height: 100%;
  }

  .equationBtn { font-size: 22px; }
  .digitBtn    { font-size: 30px; }

  .equationBtn:active,
  .digitBtn:active { transform: translateY(1px) scale(.99); }

  .equationBtn:disabled,
  .digitBtn:disabled { opacity: .45; cursor: not-allowed; }

  /* ─── アニメーション ─── */
  @keyframes shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-10px); }
    40%  { transform: translateX(10px); }
    60%  { transform: translateX(-8px); }
    80%  { transform: translateX(8px); }
    100% { transform: translateX(0); }
  }
  .shakeTarget { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .shakeTarget.shake { animation: shake .22s ease; }

  @keyframes flashCorrect {
    0%   { background: #b6f0b6; }
    60%  { background: #dffadf; }
    100% { background: #fff; }
  }
  .card.bgCorrect {
    animation: flashCorrect .45s ease;
  }

  @keyframes flashWrong {
    0%   { background: #ffb3b3; }
    60%  { background: #ffe0e0; }
    100% { background: #fff; }
  }
  .card.bgWrong {
    animation: flashWrong .45s ease;
  }

  .starParticle {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    z-index: 20;
    animation: starFloat .75s ease forwards;
  }
  @keyframes starFloat {
    0%   { opacity: 1; transform: translate(-50%, 0) scale(0.8); }
    40%  { opacity: 1; transform: translate(-50%, -55px) scale(1.4); }
    100% { opacity: 0; transform: translate(-50%, -100px) scale(1); }
  }

  /* ─── スマホ ─── */
  @media (max-width: 560px) {
    :root {
      --card-w: min(96vw, 390px);
      --pad-h: 210px;
    }

    .wrap { padding: 6px; }
    .panel { padding: 10px 8px 12px; }

    .titleRow { min-height: 92px; margin-bottom: 2px; }
    .title { line-height: 1.35; padding-top: 6px; font-size: 20px; }
    .soundBtn { top: 46px; right: 0; font-size: 13px; padding: 8px 10px; }

    .topModes { margin: 0 0 8px; gap: 8px; }
    .modeBtn { min-width: 104px; font-size: 14px; padding: 10px 12px; }

    .card { aspect-ratio: auto; height: 245px; }
    .cardDisplay { padding: 14px; }
    .appleCardsRow { gap: 8px; padding: 0; }
    .appleCardSlot { max-width: 47%; }

    .answerBadge { bottom: 10px; min-width: 64px; height: 64px; font-size: 26px; }

    .phaseHint { margin: 6px 0 4px; }

    .equationBtn { font-size: 18px; }
    .digitBtn    { font-size: 26px; }

    .controls { margin-top: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="titleRow">
      <p class="title">どんな しき？</p>
      <button id="soundBtn" class="soundBtn" type="button" aria-pressed="true" title="おとの オンオフ">
        <span id="soundIcon" class="soundIcon">🔊</span>
        <span id="soundLabel">おと ON</span>
      </button>
    </div>

    <div class="topModes" aria-label="モードせんたく">
      <button id="practiceModeBtn" class="modeBtn active" type="button">れんしゅう</button>
      <button id="challengeModeBtn" class="modeBtn" type="button">30びょう</button>
      <button id="noMissModeBtn" class="modeBtn" type="button">ノーミスモード</button>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <div id="cardInner" class="cardInner">
          <div id="cardDisplay" class="cardDisplay">
            <div id="shakeTarget" class="shakeTarget">
              <div class="appleCardsRow">
                <div class="appleCardSlot">
                  <img id="appleImgLeft" class="appleCardImg" src="" alt="ひだりの りんご" />
                </div>
                <div class="appleCardSlot">
                  <img id="appleImgRight" class="appleCardImg" src="" alt="みぎの りんご" />
                </div>
                <div id="answerBadge" class="answerBadge"></div>
              </div>
            </div>
          </div>
          <div id="messageArea" class="messageArea">
            <div class="messageInner">
              <p id="messageTitle" class="messageTitle"></p>
              <p id="messageSub" class="messageSub"></p>
              <button id="resultResetBtn" class="resultResetBtn hidden" type="button">ベストきろくを リセット</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="controls" class="controls hidden">
      <button id="mainBtn" class="mainBtn" type="button">スタート</button>
    </div>

    <div id="phaseHint" class="phaseHint">しきを えらぼう</div>

    <div class="padWrap">
      <div id="equationPad" class="equationPad">
        <!-- JS で動的生成 -->
      </div>
      <div id="digitPad" class="digitPad hidden">
        <button class="digitBtn" type="button" data-digit="1">1</button>
        <button class="digitBtn" type="button" data-digit="2">2</button>
        <button class="digitBtn" type="button" data-digit="3">3</button>
        <button class="digitBtn" type="button" data-digit="4">4</button>
        <button class="digitBtn" type="button" data-digit="5">5</button>
        <button class="digitBtn" type="button" data-digit="6">6</button>
        <button class="digitBtn" type="button" data-digit="7">7</button>
        <button class="digitBtn" type="button" data-digit="8">8</button>
        <button class="digitBtn" type="button" data-digit="9">9</button>
      </div>
    </div>
  </div>
</div>

<script>
  const IMG_BASE = "imgs/";
  const CARD_IMAGES = [null, "01.png","02.png","03.png","04.png","05.png","06.png","07.png","08.png","09.png"];

  const STORAGE_SOUND_KEY    = "shikiKotaeSoundOn";
  const STORAGE_BEST_KEY     = "shikiKotaeBest30";
  const STORAGE_BEST_NM_KEY  = "shikiKotaeBestNoMiss";

  // ─── DOM ───
  const card           = document.getElementById("card");
  const cardDisplay    = document.getElementById("cardDisplay");
  const messageArea    = document.getElementById("messageArea");
  const messageTitle   = document.getElementById("messageTitle");
  const messageSub     = document.getElementById("messageSub");
  const shakeTarget    = document.getElementById("shakeTarget");
  const appleImgLeft   = document.getElementById("appleImgLeft");
  const appleImgRight  = document.getElementById("appleImgRight");
  const answerBadge    = document.getElementById("answerBadge");
  const controls       = document.getElementById("controls");
  const mainBtn        = document.getElementById("mainBtn");
  const resultResetBtn = document.getElementById("resultResetBtn");
  const soundBtn       = document.getElementById("soundBtn");
  const equationPad    = document.getElementById("equationPad");
  const digitPad       = document.getElementById("digitPad");
  const phaseHint      = document.getElementById("phaseHint");
  const practiceModeBtn  = document.getElementById("practiceModeBtn");
  const challengeModeBtn = document.getElementById("challengeModeBtn");
  const noMissModeBtn    = document.getElementById("noMissModeBtn");
  const digitButtons   = Array.from(digitPad.querySelectorAll(".digitBtn"));

  // ─── 状態 ───
  const state = {
    mode: "practice",
    phase: "equation",       // "equation" | "answer"
    current: null,
    locked: false,
    challengeRunning: false,
    challengeBusy: false,
    score: 0,
    misses: 0,
    best: Number(localStorage.getItem(STORAGE_BEST_KEY) || 0),
    bestNoMiss: Number(localStorage.getItem(STORAGE_BEST_NM_KEY) || 0),
    soundOn: localStorage.getItem(STORAGE_SOUND_KEY) !== "off",
    timerId: null,
    nextId: null,
    showResetButton: false
  };

  // ─── 音 ───
  let audioCtx = null;
  function getAudioCtx() {
    const Cls = window.AudioContext || window.webkitAudioContext;
    if (!Cls) return null;
    if (!audioCtx) audioCtx = new Cls();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }
  function beep({ freq=880, duration=0.08, type="sine", gain=0.03, when=0 }) {
    if (!state.soundOn) return;
    const ctx = getAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.connect(amp); amp.connect(ctx.destination);
    osc.start(now); osc.stop(now + duration + 0.02);
  }
  function playCorrect() {
    beep({ freq: 880,  duration: 0.08, type: "sine", gain: 0.035, when: 0 });
    beep({ freq: 1320, duration: 0.10, type: "sine", gain: 0.03,  when: 0.08 });
  }
  function playCorrectBig() {
    beep({ freq: 880,  duration: 0.08, type: "sine", gain: 0.04,  when: 0 });
    beep({ freq: 1100, duration: 0.08, type: "sine", gain: 0.035, when: 0.08 });
    beep({ freq: 1320, duration: 0.12, type: "sine", gain: 0.03,  when: 0.17 });
  }
  function playWrong() {
    beep({ freq: 180, duration: 0.12, type: "triangle", gain: 0.03, when: 0 });
  }

  // ─── エフェクト ───
  function flashCard(cls) {
    card.classList.remove(cls);
    void card.offsetWidth;
    card.classList.add(cls);
    card.addEventListener("animationend", () => card.classList.remove(cls), { once: true });
  }
  function shakeCard() {
    shakeTarget.classList.remove("shake");
    void shakeTarget.offsetWidth;
    shakeTarget.classList.add("shake");
  }
  function spawnStars(count) {
    const positions = [
      { emoji: "⭐", left: "15%", top: "75%", delay: 0    },
      { emoji: "✨", left: "35%", top: "80%", delay: 0.05 },
      { emoji: "🌟", left: "50%", top: "72%", delay: 0.10 },
      { emoji: "✨", left: "65%", top: "78%", delay: 0.07 },
      { emoji: "⭐", left: "82%", top: "73%", delay: 0.14 },
    ];
    positions.slice(0, count).forEach(({ emoji, left, top, delay }) => {
      const el = document.createElement("span");
      el.className = "starParticle";
      el.textContent = emoji;
      el.style.left = left;
      el.style.top  = top;
      el.style.animationDelay = delay + "s";
      card.appendChild(el);
      el.addEventListener("animationend", () => el.remove());
    });
  }

  // ─── 式の生成 ───
  function generateChoices(left, right) {
    const correct = { l: left, r: right };
    const candidates = [
      { l: left - 1, r: right },
      { l: left + 1, r: right },
      { l: left,     r: right - 1 },
      { l: left,     r: right + 1 },
    ].filter(c =>
      c.l >= 1 && c.l <= 9 &&
      c.r >= 1 && c.r <= 9 &&
      !(c.l === left && c.r === right)
    );
    shuffle(candidates);
    const distractors = candidates.slice(0, 3);
    const all = [...distractors, correct];
    shuffle(all);
    return all;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // ─── 問題生成 ───
  function pickProblem() {
    let problem;
    do {
      const sum = Math.floor(Math.random() * 7) + 3; // 3〜9（1+1 を除く）
      let leftCount = Math.floor(Math.random() * (sum - 2)) + 1; // 1〜sum-2
      let rightCount = sum - leftCount;
      if (Math.random() < 0.5) [leftCount, rightCount] = [rightCount, leftCount];
      const pairKey = [leftCount, rightCount].sort((a, b) => a - b).join("-");
      problem = { sum, leftCount, rightCount, pairKey };
    } while (state.current && problem.pairKey === state.current.pairKey);
    return problem;
  }

  // ─── 表示制御 ───
  function showCardView() {
    cardDisplay.classList.add("show");
    messageArea.classList.remove("show");
    state.showResetButton = false;
  }
  function showMessage(title, sub) {
    cardDisplay.classList.remove("show");
    messageArea.classList.add("show");
    messageTitle.textContent = title;
    messageSub.textContent   = sub;
    resultResetBtn.classList.toggle("hidden", !state.showResetButton);
  }
  function showAnswerBadge(text) {
    answerBadge.textContent = text;
    answerBadge.classList.add("show");
  }
  function hideAnswerBadge() {
    answerBadge.textContent = "";
    answerBadge.classList.remove("show");
  }
  function updateSoundButton() {
    soundBtn.classList.toggle("off", !state.soundOn);
    document.getElementById("soundIcon").textContent  = state.soundOn ? "🔊" : "🔇";
    document.getElementById("soundLabel").textContent = state.soundOn ? "おと ON" : "おと OFF";
  }

  // ─── フェーズ切り替え ───
  function showEquationPhase(choices) {
    state.phase = "equation";
    phaseHint.textContent = "しきを えらぼう";

    equationPad.innerHTML = "";
    choices.forEach(({ l, r }) => {
      const btn = document.createElement("button");
      btn.className = "equationBtn";
      btn.type = "button";
      btn.textContent = `${l}＋${r}`;
      btn.dataset.l = l;
      btn.dataset.r = r;
      btn.addEventListener("click", () => handleEquationAnswer(l, r));
      equationPad.appendChild(btn);
    });

    equationPad.classList.remove("hidden");
    digitPad.classList.add("hidden");
    setEquationDisabled(false);
  }

  function showAnswerPhase() {
    state.phase = "answer";
    phaseHint.textContent = "こたえは？";
    equationPad.classList.add("hidden");
    digitPad.classList.remove("hidden");
    setDigitDisabled(false);
  }

  function setEquationDisabled(disabled) {
    Array.from(equationPad.querySelectorAll(".equationBtn")).forEach(b => b.disabled = disabled);
  }
  function setDigitDisabled(disabled) {
    digitButtons.forEach(b => b.disabled = disabled);
  }
  function setAllDisabled(disabled) {
    setEquationDisabled(disabled);
    setDigitDisabled(disabled);
  }

  // ─── 問題セット ───
  function setProblem(problem) {
    state.current = problem;
    appleImgLeft.src  = IMG_BASE + CARD_IMAGES[problem.leftCount];
    appleImgRight.src = IMG_BASE + CARD_IMAGES[problem.rightCount];
    hideAnswerBadge();
    showCardView();
    state.locked = false;
    const choices = generateChoices(problem.leftCount, problem.rightCount);
    showEquationPhase(choices);
  }

  // ─── 式の回答処理 ───
  function handleEquationAnswer(l, r) {
    if (state.mode === "practice" && state.locked) return;
    if ((state.mode === "challenge" || state.mode === "nomiss") && (!state.challengeRunning || state.challengeBusy)) return;

    const isCorrect = (l === state.current.leftCount && r === state.current.rightCount);

    if (isCorrect) {
      setEquationDisabled(true);
      showAnswerBadge(`${l}＋${r}`);
      flashCard("bgCorrect");
      playCorrect();
      state.nextId = setTimeout(() => {
        hideAnswerBadge();
        showAnswerPhase();
      }, 400);
    } else {
      shakeCard();
      flashCard("bgWrong");
      playWrong();
      if (state.mode === "nomiss") {
        state.challengeBusy = true;
        setEquationDisabled(true);
        state.nextId = setTimeout(() => endNoMiss(), 300);
      } else if (state.mode === "challenge") {
        state.misses++;
      }
    }
  }

  // ─── 答えの回答処理 ───
  function handleDigitAnswer(value) {
    if (state.mode === "practice" && state.locked) return;
    if ((state.mode === "challenge" || state.mode === "nomiss") && (!state.challengeRunning || state.challengeBusy)) return;

    const isCorrect = (value === state.current.sum);

    if (state.mode === "practice") {
      state.locked = true;
    } else {
      state.challengeBusy = true;
    }
    setAllDisabled(true);

    if (isCorrect) {
      if (state.mode === "challenge" || state.mode === "nomiss") state.score++;
      showAnswerBadge(String(value));
      flashCard("bgCorrect");
      spawnStars(5);
      playCorrectBig();
      const delay = state.mode === "practice" ? 500 : 350;
      state.nextId = setTimeout(() => {
        if (state.mode === "practice") {
          setProblem(pickProblem());
        } else if (state.mode === "nomiss") {
          if (!state.challengeRunning) return;
          state.challengeBusy = false;
          setProblem(pickProblem());
        } else {
          if (!state.challengeRunning) return;
          if (Date.now() >= state.endAt) { endChallenge(); return; }
          state.challengeBusy = false;
          setProblem(pickProblem());
        }
      }, delay);
    } else {
      shakeCard();
      flashCard("bgWrong");
      playWrong();
      if (state.mode === "nomiss") {
        state.nextId = setTimeout(() => endNoMiss(), 300);
      } else {
        if (state.mode === "challenge") state.misses++;
        state.nextId = setTimeout(() => {
          if (state.mode === "practice") {
            state.locked = false;
            setDigitDisabled(false);
          } else {
            if (!state.challengeRunning) return;
            state.challengeBusy = false;
            setDigitDisabled(false);
          }
        }, 280);
      }
    }
  }

  // ─── ノーミスモード ───
  function endNoMiss() {
    if (!state.challengeRunning) return;
    clearTimers();
    state.challengeRunning = false;
    state.challengeBusy = false;
    setAllDisabled(true);
    const isNewBest = state.score > state.bestNoMiss;
    if (isNewBest) {
      state.bestNoMiss = state.score;
      localStorage.setItem(STORAGE_BEST_NM_KEY, String(state.bestNoMiss));
    }
    const sub = isNewBest
      ? `ベスト こうしん！`
      : `ベスト ${state.bestNoMiss}もん`;
    state.showResetButton = true;
    showMessage(`${state.score}もん\nできた！`, `ミスで しゅうりょう\n${sub}`);
    mainBtn.disabled = false;
    mainBtn.textContent = "もういちど";
    equationPad.classList.add("hidden");
    digitPad.classList.add("hidden");
  }

  // ─── チャレンジモード ───
  function startChallenge() {
    clearTimers();
    state.challengeRunning = true;
    state.challengeBusy = false;
    state.score = 0;
    state.misses = 0;
    state.showResetButton = false;
    mainBtn.disabled = true;
    mainBtn.textContent = "ちょうせん中";
    setProblem(pickProblem());
    if (state.mode === "challenge") {
      state.endAt = Date.now() + 30000;
      state.timerId = setInterval(() => {
        if (Date.now() >= state.endAt) endChallenge();
      }, 100);
    }
  }

  function endChallenge() {
    if (!state.challengeRunning) return;
    clearTimers();
    state.challengeRunning = false;
    state.challengeBusy = false;
    setAllDisabled(true);
    const isNewBest = state.score > state.best;
    if (isNewBest) {
      state.best = state.score;
      localStorage.setItem(STORAGE_BEST_KEY, String(state.best));
    }
    const sub = isNewBest
      ? `ミス ${state.misses}かい\nベスト こうしん！`
      : `ミス ${state.misses}かい\nベスト ${state.best}もん`;
    state.showResetButton = true;
    showMessage(`${state.score}もん\nできた！`, sub);
    mainBtn.disabled = false;
    mainBtn.textContent = "もういちど";
    equationPad.classList.add("hidden");
    digitPad.classList.add("hidden");
  }

  function resetChallenge() {
    clearTimers();
    state.challengeRunning = false;
    state.challengeBusy = false;
    state.score = 0;
    state.showResetButton = false;
    mainBtn.disabled = false;
    mainBtn.textContent = "スタート";
    setAllDisabled(true);
    equationPad.classList.add("hidden");
    digitPad.classList.add("hidden");
    const isNoMiss = state.mode === "nomiss";
    showMessage(
      isNoMiss ? "ノーミス\nモード" : "30びょう",
      isNoMiss ? "ミスしたら おわり" : "スタートで はじめるよ"
    );
    controls.classList.remove("hidden");
  }

  function clearTimers() {
    clearTimeout(state.nextId);
    clearInterval(state.timerId);
    state.nextId = null; state.timerId = null;
  }

  // ─── モード切り替え ───
  function setMode(mode) {
    clearTimers();
    state.mode = mode;
    practiceModeBtn.classList.toggle("active",  mode === "practice");
    challengeModeBtn.classList.toggle("active", mode === "challenge");
    noMissModeBtn.classList.toggle("active",    mode === "nomiss");

    if (mode === "practice") {
      shakeTarget.classList.remove("shake");
      card.classList.remove("bgWrong", "bgCorrect");
      controls.classList.add("hidden");
      equationPad.classList.remove("hidden");
      digitPad.classList.add("hidden");
      setProblem(pickProblem());
    } else {
      resetChallenge();
    }
  }

  // ─── イベント ───
  digitButtons.forEach(btn => {
    btn.addEventListener("click", () => handleDigitAnswer(Number(btn.dataset.digit)));
  });

  mainBtn.addEventListener("click", () => {
    if ((state.mode === "challenge" || state.mode === "nomiss") && !state.challengeRunning) startChallenge();
  });

  resultResetBtn.addEventListener("click", () => {
    if (state.mode === "nomiss") {
      state.bestNoMiss = 0;
      localStorage.removeItem(STORAGE_BEST_NM_KEY);
      showMessage(`${state.score}もん\nできた！`, `ミスで しゅうりょう\nベストきろくを リセットしたよ`);
    } else {
      state.best = 0;
      localStorage.removeItem(STORAGE_BEST_KEY);
      showMessage(`${state.score}もん\nできた！`, `ミス ${state.misses}かい\nベストきろくを リセットしたよ`);
    }
    state.showResetButton = false;
  });

  practiceModeBtn.addEventListener("click",  () => { if (state.mode !== "practice")  setMode("practice");  });
  challengeModeBtn.addEventListener("click", () => { if (state.mode !== "challenge") setMode("challenge"); });
  noMissModeBtn.addEventListener("click",    () => { if (state.mode !== "nomiss")    setMode("nomiss");    });

  soundBtn.addEventListener("click", () => {
    state.soundOn = !state.soundOn;
    localStorage.setItem(STORAGE_SOUND_KEY, state.soundOn ? "on" : "off");
    updateSoundButton();
  });

  document.addEventListener("keydown", e => {
    if (e.repeat) return;
    if (/^[1-9]$/.test(e.key) && state.phase === "answer") {
      handleDigitAnswer(Number(e.key));
    }
    if (e.key === "Enter" && (state.mode === "challenge" || state.mode === "nomiss") && !state.challengeRunning) {
      startChallenge();
    }
  });

  // ─── 起動 ───
  function preloadImages() {
    for (let i = 1; i <= 9; i++) {
      const img = new Image();
      img.src = IMG_BASE + CARD_IMAGES[i];
    }
  }

  preloadImages();
  updateSoundButton();
  setMode("practice");
</script>
</body>
</html>
